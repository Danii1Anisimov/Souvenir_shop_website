<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Маркет · Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">

        <section class="products-container">
            <div class="shop-header">
                <h1>🛍️ Каталог сувенирной лавки ЧГУ</h1>
                <div class="sort-bar">
                    <span class="sort-label">Сортировать:</span>
                    <button class="sort-btn active" data-sort="default">📋 По умолчанию</button>
                    <button class="sort-btn" data-sort="asc">⬆️ Дешевле</button>
                    <button class="sort-btn" data-sort="desc">⬇️ Дороже</button>
                </div>
            </div>
            <div id="productsGrid" class="products-grid">
                <div style="text-align: center; padding: 2rem;">Загрузка товаров...</div>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
